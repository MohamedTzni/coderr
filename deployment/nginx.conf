server {
    listen 80;
    server_name 217.154.174.108;

    # Statische Dateien direkt über Nginx ausliefern
    location /static/ {
        alias /var/www/coderr/staticfiles/;
    }

    # Medien-Dateien (Profilbilder etc.)
    location /media/ {
        alias /var/www/coderr/media/;
    }

    # Alle anderen Anfragen an Gunicorn weiterleiten
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
